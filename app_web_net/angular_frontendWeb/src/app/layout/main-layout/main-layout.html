<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar__brand">
  <div class="sidebar__logo-container">
    <img
      src="images/logo2.1.png"
      class="sidebar__logo-image"
      alt="Vision Guard"
    />
  </div>
  <span class="sidebar__brand-name">
    VISION <span class="sidebar__brand-name--highlight">GUARD</span>
  </span>
</div>
    <!-- nuestro menu de navegación -->
    <nav class="sidebar__nav">
      @for (item of navItems; track item.route) {
        <a
          class="sidebar__nav-item"
          [routerLink]="item.route"
          routerLinkActive="sidebar__nav-item--active"
          [routerLinkActiveOptions]="{ exact: item.route === '/' }"
        >
          <span class="sidebar__nav-icon">
            @switch (item.icon) {
              @case ('inicio') {
                <svg viewBox="0 0 24 24">
                  <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                  <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
              }

              @case ('dispositivos') {
                <svg viewBox="0 0 24 24">
                  <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
                  <line x1="12" y1="18" x2="12.01" y2="18"/>
                </svg>
              }

              @case ('mapa') {
                <svg viewBox="0 0 24 24">
                  <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/>
                  <line x1="9" y1="3" x2="9" y2="18"/>
                  <line x1="15" y1="6" x2="15" y2="21"/>
                </svg>
              }

              @case ('graficas') {
                <svg viewBox="0 0 24 24">
                  <line x1="18" y1="20" x2="18" y2="10"/>
                  <line x1="12" y1="20" x2="12" y2="4"/>
                  <line x1="6" y1="20" x2="6" y2="14"/>
                </svg>
              }

              @case ('instituciones') {
                <svg viewBox="0 0 24 24">
                  <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                  <path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"/>
                </svg>
              }

              @case ('proveedores') {
                <svg viewBox="0 0 24 24">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                </svg>
              }

              @case ('materia-prima') {
                <svg viewBox="0 0 24 24">
                  <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
              }
            }
          </span>

          <span class="sidebar__nav-label">
            {{ item.label }}
          </span>
        </a>
      }
    </nav>

    <div class="sidebar__footer">
      <button
        type="button"
        class="sidebar__btn sidebar__btn--settings"
        routerLink="/ajustes"
        routerLinkActive="sidebar__btn--active"
      >
        <svg class="sidebar__btn-icon" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span>Ajustes</span>
      </button>

      <button
        type="button"
        class="sidebar__btn sidebar__btn--logout"
        (click)="logout()"
      >
        <svg class="sidebar__btn-icon" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Cerrar Sesión</span>
      </button>
    </div>

  </aside>
  <main class="app-shell__content">
    <router-outlet></router-outlet>
  </main>
</div>
