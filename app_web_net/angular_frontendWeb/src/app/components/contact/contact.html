<section id="contact" class="contact">

  <div class="contact-wrap">

  
    <div class="contact-left">
      <img src="images/logo.png" alt="Vision Guard">
      <p>Estamos listos para ayudarte. Escríbenos y te respondemos lo antes posible.</p>
    </div>

  
    <div class="contact-right">
      <h2>Contáctanos</h2>
      <form class="contact-form" onsubmit="handleSend(event)">
        <div class="form-field">
          <label for="nombre">Nombre:</label>
          <input type="text" id="nombre" placeholder="Tu nombre completo" required>
        </div>
        <div class="form-field">
          <label for="email">Correo electrónico:</label>
          <input type="email" id="email" placeholder="correo@empresa.com" required>
        </div>
        <div class="form-field">
          <label for="telefono">Teléfono:</label>
          <input type="tel" id="telefono" placeholder="+52 477 000 0000">
        </div>
        <div class="form-field">
          <label for="mensaje">¿Cómo podemos ayudarte?</label>
          <textarea id="mensaje" placeholder="Describe tu proyecto o consulta..."></textarea>
        </div>
        <button type="submit" class="btn-submit">Enviar</button>
      </form>
      <p class="form-toast" id="toast">Mensaje enviado correctamente.</p>
    </div>

  </div>

  <script>
    function handleSend(e) {
      e.preventDefault();
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      e.target.reset();
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
  </script>

</section>
